<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐播放器项目</title>
</head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="./css/base.css">
<link rel="stylesheet" href="./css/index.css">
<body>
    <!-- 头部区域 -->
    <div class="header">
        <!-- logo -->
         <div class="logo">
            <h1><a href="#">
                <img src="./images/logo.jpg" alt="">
                乐听
            </a></h1>
         </div>
        <!-- 导航 -->
         <div class="nav">
            <ul>
                <li><a href="#" class="active">首页</a></li>
                <li><a href="#">发现</a></li>
                <li><a href="#">我的</a></li>
                <li><a href="#">社区</a></li>
            </ul>
         </div>
        <!-- 搜索 -->
         <div class="search">
            <input type="text" placeholder="你想搜些什么?">
            <a href="#"></a>
            <button>搜索</button>
         </div>
         <!-- 用户中心  -->
          <div class="user">
            <a href="#"></a>
            <img src="./images/avatar.jpg" alt="">
            <span>小张学前端</span>
          </div>
    </div>
    <!-- banner区域 -->
     <div class="banner">
        <!-- 主卡片区域 -->
            <div class="left">
                <img src="./uploads/cover-main.jpg" alt="">
                <div class="txt1">
                    星夜电台
                </div>
                <div class="txt2">
                    歌手：晚风
                </div>
                <div class="txt3">
                    专辑：城市漫游
                </div>
                <div class="play">
                    <div>
                        <button class="last">
                            <i class="fas fa-step-backward"></i>
                        </button>
                    </div>
                    <div>
                        <button class="stop" id="playBtn">
                            <i class="fas fa-play play-icon"></i>
                        </button>
                    </div>
                    <div>
                        <button class="next">
                            <i class="fas fa-step-forward"></i>
                        </button>
                    </div>
                </div>
            </div>
            <!-- 推荐卡片区域 -->
            <div class="right">
                <div class="right1">
                    <div class="song">
                        <img src="./uploads/song1.jpg" alt="">
                        <div class="txt4">
                            <div class="song-name">吉他与诗</div>
                            <div class="song-info">歌手：木野 &nbsp;|&nbsp; 时长:3:42</div>
                        </div>
                    </div>
                </div>
                <div class="right2">
                    <div class="song">
                        <img src="./uploads/song2.jpg" alt="">
                        <div class="txt4">
                            <div class="song-name">耳机里的海</div>
                            <div class="song-info">歌手：潮汐</div>
                        </div>
                    </div>
                </div>
                <div class="right3">
                    <div class="song">
                        <img src="./uploads/song3.jpg" alt="">
                        <div class="txt4">
                            <div class="song-name">黑胶旧梦</div>
                            <div class="song-info">时长:4:15</div>
                        </div>
                    </div>
                </div>
                <div class="right4">
                    <div class="song">
                        <img src="./uploads/song4.jpg" alt="">
                        <div class="txt4">
                            <div class="song-name"></div>
                            <div class="song-info">歌手：陈默 &nbsp;|&nbsp; 时长:2:58</div>
                        </div>
                </div>
            </div>
     </div>
</body>
</html>
